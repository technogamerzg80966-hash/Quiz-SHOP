<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Flawless Quiz Portal</title>
    <style>
        /* Glowing Deep Space Background Style */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d0d26, #050510);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Ambient Glowing Orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.12);
            filter: blur(100px);
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(255, 0, 128, 0.12);
            right: 5%;
            bottom: 5%;
            animation-delay: 5s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(40px) scale(1.15); }
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        h1 {
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
        }

        p {
            color: #b0b0d0;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        select {
            background: #0f0f25;
            color: #fff;
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        select:focus {
            border-color: #ff0080;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.3);
        }

        button {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 0, 128, 0.5);
        }

        .hidden { display: none !important; }

        /* Quiz UI */
        .quiz-box { text-align: left; margin-top: 25px; }
        .question { font-size: 1.35rem; margin-bottom: 25px; font-weight: 600; line-height: 1.5; }
        
        .option-btn {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #def7ff;
            text-align: left;
            padding: 15px 20px;
            margin: 12px 0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.15), rgba(255, 0, 128, 0.05));
            border-color: #00e5ff;
            transform: translateX(5px);
        }

            height: 6px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 20px;
