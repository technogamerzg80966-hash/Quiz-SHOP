<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Interactive Quiz Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d0d26, #050510);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        h1 {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        select, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        select {
            background: #0f0f25;
            color: white;
            border: 1px solid #00e5ff;
            outline: none;
        }
        button {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { transform: translateY(-2px); }
        .hidden { display: none !important; }
        
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not([disabled]) {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
        }

        /* Instant Feedback States */
        .option-btn.correct {
            background: #00c853 !important;
            border-color: #00c853 !important;
            color: white !important;
        }
        .option-btn.incorrect {
            background: #d50000 !important;
            border-color: #d50000 !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div class="container" id="screen-setup">
        <h1>CBSE Grand Portal</h1>
        <p>Select your configuration:</p>
        
        <select id="grade">
            <option value="6">Grade 6</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
        </select>

        <select id="subject">
            <option value="Mathematics">Mathematics</option>
            <option value="Science">Science / Physics</option>
            <option value="Social Science">Social Science</option>
            <option value="English">English</option>
        </select>

        <button id="launch-btn">Launch Test</button>
    </div>

    <div class="container hidden" id="screen-quiz">
        <h2 id="quiz-header" style="color:#00e5ff; margin-top:0;"></h2>
        <h3 id="quiz-progress" style="color:#aaa;"></h3>
        <div id="quiz-question" style="font-size:1.3rem; margin:20px 0; text-align:left; font-weight:600; line-height: 1.4;"></div>
        <div id="quiz-options"></div>
    </div>

    <div class="container hidden" id="screen-results">
        <h1>Evaluation Complete</h1>
        <p id="quiz-score" style="font-size: 2rem; color: #ff0080; font-weight:bold;"></p>
        <button onclick="location.reload()">Restart Portal</button>
    </div>

    <script>
        // EXPANDED SEPARATE SUBJECT POOLS
        const subjectsData = {
            "English": [
                { q: "What is the antonym of the word 'Ancient'?", options: ["Old", "Modern", "Historic", "Past"] },
                { q: "Identify the pronoun in the sentence: 'She went to the market.'", options: ["She", "went", "market", "to"] },
                { q: "Which of these is a regular verb?", options: ["Go", "Eat", "Walk", "See"] },
                { q: "Choose the correctly spelled word:", options: ["Receive", "Recieve", "Receve", "Ricieve"] },
                { q: "What is the plural form of 'Child'?", options: ["Childs", "Children", "Childrens", "Childes"] }
            ],
            "Mathematics": [
                { q: "What is the value of x if 3x - 7 = 14?", options: ["7", "6", "5", "8"] },
                { q: "What is the area of a square whose side is 6 cm?", options: ["36 sq cm", "24 sq cm", "12 sq cm", "18 sq cm"] },
                { q: "What is the smallest prime number?", options: ["2", "1", "0", "3"] },
                { q: "What is 15% of 200?", options: ["30", "20", "15", "40"] },
                { q: "How many degrees are there in a straight line?", options: ["180°", "90°", "360°", "270°"] }
            ],
            "Science": [
                { q: "Which gas do plants absorb during photosynthesis?", options: ["Carbon Dioxide", "Oxygen", "Nitrogen", "Hydrogen"] },
                { q: "What is the SI unit of force?", options: ["Newton", "Joule", "Watt", "Pascal"] },
                { q: "Which planet is closest to the Sun?", options: ["Mercury", "Venus", "Earth", "Mars"] },
                { q: "What is the chemical symbol for Gold?", options: ["Au", "Ag", "Fe", "Gd"] },
                { q: "Which component of blood helps in clotting?", options: ["Platelets", "Red Blood Cells", "White Blood Cells", "Plasma"] }
            ],
            "Social Science": [
                { q: "Who is known as the Father of the Indian Constitution?", options: ["Dr. B.R. Ambedkar", "Mahatma Gandhi", "Jawaharlal Nehru", "Dr. Rajendra Prasad"] },
                { q: "Which is the longest river in the world?", options: ["Nile", "Amazon", "Yangtze", "Mississippi"] },
                { q: "In which year did India gain Independence?", options: ["1947", "1950", "1942", "1935"] },
                { q: "What is the capital city of France?", options: ["Paris", "London", "Berlin", "Rome"] },
                { q: "Which line divides India into almost two equal halves?", options: ["Tropic of Cancer", "Equator", "Tropic of Capricorn", "Prime Meridian"] }
            ]
        };

        document.getElementById('launch-btn').addEventListener('click', function() {
            const selectedGrade = document.getElementById('grade').value;
            let selectedSubject = document.getElementById('subject').value;
            
            // Normalize alternate name "Science / Physics" to key match "Science"
            if(selectedSubject === "Science / Physics") selectedSubject = "Science";

            // Grab the subject specific list
            let sourcePool = subjectsData[selectedSubject] || [];
            let questions = [];

            // Duplicate/Generate up to 30 unique variants specifically for that subject
            let variantCounter = 1;
            while(questions.length < 30 && sourcePool.length > 0) {
                sourcePool.forEach(item => {
                    if(questions.length < 30) {
                        questions.push({
                            q: `(${selectedSubject} Q${variantCounter}) ${item.q}`,
                            // Store the first item as the absolute correct textual answer
                            correctText: item.options[0], 
                            options: [...item.options]
                        });
                        variantCounter++;
                    }
                });
            }

            // SHUFFLE ALGORITHM 1: Re-arrange the questions array
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }

            // SHUFFLE ALGORITHM 2: Re-arrange the options arrays individually inside each question
            questions.forEach(item => {
                for (let i = item.options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
                }
            });

            let currentIndex = 0;
            let score = 0;

            document.getElementById('screen-setup').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('quiz-header').innerText = `Grade ${selectedGrade} • ${selectedSubject}`;

            function renderQuestion() {
                const currentQ = questions[currentIndex];
                document.getElementById('quiz-question').innerText = currentQ.q;
                document.getElementById('quiz-progress').innerText = `Question ${currentIndex + 1} of 30`;
                
                const optionsDiv = document.getElementById('quiz-options');
                optionsDiv.innerHTML = '';

                currentQ.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    
                    btn.onclick = function() {
                        // Freeze all buttons so users cannot click multiple choices
                        const allBtns = optionsDiv.querySelectorAll('.option-btn');
                        allBtns.forEach(b => b.disabled = true);

                        // Visual Verification Check
                        if (opt === currentQ.correctText) {
                            btn.classList.add('correct');
                            score++;
                        } else {
                            btn.classList.add('incorrect');
                            // Find and highlight the correct button in green so they can see the right choice
                            allBtns.forEach(b => {
                                if(b.innerText === currentQ.correctText) b.classList.add('correct');
                            });
                        }

                        // Short delay so they can read and learn the correct choice before sliding over
                        setTimeout(() => {
                            currentIndex++;
                            if (currentIndex < questions.length) {
                                renderQuestion();
                            } else {
                                document.getElementById('screen-quiz').classList.add('hidden');
                                document.getElementById('screen-results').classList.remove('hidden');
                                document.getElementById('quiz-score').innerText = `Final Score: ${score} / 30`;
                            }
                        }, 1200);
                    };
                    optionsDiv.appendChild(btn);
                });
            }

            renderQuestion();
        });
    </script>
</body>
</html>
