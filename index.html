<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Quiz Portal</title>
    <style>
        /* Glowing Abstract Background Style */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a3a, #0a0a16);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Ambient Glow Effects */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.15);
            filter: blur(80px);
            z-index: -1;
            animation: float 8s infinite alternate;
        }
        body::after {
            background: rgba(255, 0, 128, 0.15);
            right: 10%;
            bottom: 10%;
            animation-delay: 4s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .input-group {
            margin: 20px 0;
        }

        select {
            background: #111;
            color: #fff;
            border: 1px solid #00e5ff;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        button {
            background: linear-gradient(45deg, #00e5ff, #ff0080);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 128, 0.6);
        }

        .hidden { display: none; }

        /* Quiz Styling */
        .quiz-box { text-align: left; }
        .question { font-size: 1.3rem; margin-bottom: 20px; font-weight: 600; }
        
        .option-btn {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: left;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: none;
        }

        .option-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="container" id="setup-screen">
        <h1>CBSE Quiz Hub</h1>
        <p>Select your grade and subject to begin</p>
        
        <div class="input-group">
            <select id="grade-select">
                <option value="10">Grade 10</option>
                <option value="12">Grade 12</option>
            </select>

            <select id="subject-select">
                <option value="Science">Science / Physics</option>
                <option value="Mathematics">Mathematics</option>
            </select>
        </div>

        <button onclick="startQuiz()">Start Flawless Quiz</button>
    </div>

    <div class="container hidden" id="quiz-screen">
        <h2 id="quiz-title" style="margin-top:0; color:#00e5ff;"></h2>
        <div class="quiz-box">
            <div class="question" id="question-text">Loading question...</div>
            <div id="options-container"></div>
        </div>
    </div>

    <div class="container hidden" id="result-screen">
        <h1>Quiz Completed!</h1>
        <p id="score-text" style="font-size: 1.5rem; margin: 20px 0;"></p>
        <button onclick="resetQuiz()">Try Another Quiz</button>
    </div>

    <script>
        // EXPAND THIS DATA OBJECT TO ADD ALL 30 QUESTIONS PER SUBJECT
        const quizDatabase = {
            "10": {
                "Science": [
                    { q: "What is the chemical formula of Rust?", options: ["Fe2O3 · xH2O", "FeO", "Fe3O4", "FeCl3"], answer: 0 },
                    { q: "Which plant hormone inhibits growth?", options: ["Auxin", "Gibberellin", "Abscisic Acid", "Cytokinin"], answer: 2 }
                ],
                "Mathematics": [
                    { q: "What is the discriminant of the equation $x^2 - 4x + 4 = 0$?", options: ["4", "0", "-4", "16"], answer: 1 }
                ]
            },
            "12": {
                "Science": [
                    { q: "SI unit of Electric Flux is:", options: ["N/C", "V·m", "C/N", "Wb"], answer: 1 }
                ],
                "Mathematics": [
                    { q: "What is the derivative of $\sin(x^2)$?", options: ["$2x \cos(x^2)$", "$\cos(x^2)$", "$-2x \cos(x^2)$", "$2\sin(x)$"], answer: 0 }
                ]
            }
        };

        let currentGrade, currentSubject, currentQuestionIndex, score, selectedQuizData;

        function startQuiz() {
            currentGrade = document.getElementById('grade-select').value;
            currentSubject = document.getElementById('subject-select').value;
            selectedQuizData = quizDatabase[currentGrade]?.[currentSubject] || [];

            if (selectedQuizData.length === 0) {
                alert("No questions added for this selection yet!");
                return;
            }

            currentQuestionIndex = 0;
            score = 0;

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            document.getElementById('quiz-title').innerText = `Grade ${currentGrade} - ${currentSubject}`;
            showQuestion();
        }

        function showQuestion() {
            const currentQ = selectedQuizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${currentQ.q}`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => handleAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex) {
            if (selectedIndex === selectedQuizData[currentQuestionIndex].answer) {
                score++;
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < selectedQuizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `You scored ${score} out of ${selectedQuizData.length}!`;
        }

        function resetQuiz() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
