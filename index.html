<!DOCTYPE html>
<html>
<head>
<title>School Quiz</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.box{
background:white;
width:500px;
margin:auto;
margin-top:50px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

#score{
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>School Quiz</h1>

<h2>Choose a Subject</h2>

<button onclick="mathQuiz()">Math</button>
<button onclick="scienceQuiz()">Science</button>
<button onclick="englishQuiz()">English</button>

<h3 id="question">Click a subject to start!</h3>

<div id="answers"></div>

<p id="result"></p>

<p id="score">Score: 0</p>

</div>

<script>

let score=0;

function check(correct){

if(correct){
document.getElementById("result").innerHTML="✅ Correct!";
score++;
}
else{
document.getElementById("result").innerHTML="❌ Wrong!";
}

document.getElementById("score").innerHTML="Score: "+score;
}

function mathQuiz(){

document.getElementById("question").innerHTML=
"What is 8 × 7?";

document.getElementById("answers").innerHTML=
`
<button onclick="check(false)">54</button>
<button onclick="check(true)">56</button>
<button onclick="check(false)">64</button>
`;
}

function scienceQuiz(){

document.getElementById("question").innerHTML=
"Which planet is known as the Red Planet?";

document.getElementById("answers").innerHTML=
`
<button onclick="check(false)">Earth</button>
<button onclick="check(true)">Mars</button>
<button onclick="check(false)">Jupiter</button>
`;
}

function englishQuiz(){

document.getElementById("question").innerHTML=
"Which word is a noun?";

document.getElementById("answers").innerHTML=
`
<button onclick="check(true)">School</button>
<button onclick="check(false)">Run</button>
<button onclick="check(false)">Quickly</button>
`;
}

</script>

</body>
</html>
